<!DOCTYPE html>
<html>
<head><title>CSV Load Test</title></head>
<body>
<h2>CSV Load Test</h2>
<div id="output"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const DATA_FILE_PATH = './your-file.csv';  // change to your actual CSV filename
fetch(DATA_FILE_PATH)
  .then(r => r.text())
  .then(csv => {
    const result = Papa.parse(csv, { header: false, skipEmptyLines: true });
    document.getElementById('output').innerHTML = `<pre>First 5 rows:\n${result.data.slice(0,5).map(row => row.join(',')).join('\n')}</pre>`;
  })
  .catch(e => document.getElementById('output').innerHTML = 'Error: ' + e);
</script>
</body>
</html>
